services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: capali_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - APP_URL=${APP_URL:-http://localhost:3000}
      - DATABASE_URL=postgresql://capali:capali_password@postgres:5432/capali_db
      - REDIS_URL=redis://redis:6379
      - MONGODB_URI=mongodb://capali:capali_password@mongodb:27017/capali_forum?authSource=admin
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=capali_minio
      - MINIO_SECRET_KEY=capali_minio_password
      - MINIO_BUCKET=capali
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: capali_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: capali
      POSTGRES_PASSWORD: capali_password
      POSTGRES_DB: capali_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capali -d capali_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: capali_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: capali_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: capali_minio
      MINIO_ROOT_PASSWORD: capali_minio_password
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongodb:
    image: mongo:7
    container_name: capali_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: capali
      MONGO_INITDB_ROOT_PASSWORD: capali_password
    ports:
      - "27018:27017"
    volumes:
      - capali_mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "-u", "capali", "-p", "capali_password", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
  capali_mongodb_data: